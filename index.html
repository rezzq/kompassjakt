<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kompassjakt">
<title>Kompassjakt</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--accent:#00e5b4;--accent2:#0077ff;--danger:#ff4d6d;--warn:#ffbe0b;--text:#e8edf5;--muted:#6b7a99;--border:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,20px)}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(1px 1px at 20% 15%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 75% 8%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 30%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 90% 40%,rgba(255,255,255,.4) 0%,transparent 100%)}
.app{position:relative;z-index:1;width:100%;max-width:440px;padding:1.25rem 1.25rem 2rem;display:flex;flex-direction:column;align-items:center;gap:.9rem}
.header{width:100%;display:flex;justify-content:space-between;align-items:center;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.logo{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;user-select:none}
.logo span{color:var(--muted)}
.location-bar{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;font-size:12px}
.loc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.loc-dot.searching{background:var(--warn);animation:pulse 1.2s infinite}
.loc-dot.ok{background:var(--accent)}
.loc-dot.err{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.loc-text{color:var(--muted);flex:1;line-height:1.4}
.loc-text strong{color:var(--text)}
.stats{width:100%;display:flex;gap:8px}
.stat{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.6rem .5rem;text-align:center}
.stat-num{font-family:'Space Mono',monospace;font-size:18px;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.idle-screen{display:flex;flex-direction:column;align-items:center;text-align:center;gap:1.25rem;padding:1.5rem 0}
.idle-icon{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,180,.15),transparent 70%);border:1px solid rgba(0,229,180,.3);display:flex;align-items:center;justify-content:center;font-size:40px}
.idle-title{font-size:26px;font-weight:800}
.idle-desc{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px}
.capital-card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.1rem 1.25rem;text-align:center;position:relative;overflow:hidden}
.capital-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.phase-pill{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:.6rem;background:rgba(0,229,180,.12);color:var(--accent);border:1px solid rgba(0,229,180,.25)}
.phase-pill.result{background:rgba(0,119,255,.12);color:#60a5fa;border-color:rgba(0,119,255,.25)}
.capital-name{font-size:28px;font-weight:800;color:var(--text);line-height:1.1}
.capital-country{font-size:13px;color:var(--muted);margin-top:4px}
.capital-dist{font-size:11px;color:var(--muted);margin-top:6px;font-family:'Space Mono',monospace}
.compass-section{width:100%;display:flex;flex-direction:column;align-items:center;gap:.75rem}
.heading-row{display:flex;align-items:baseline;gap:.5rem}
.heading-val{font-family:'Space Mono',monospace;font-size:32px;color:var(--text)}
.heading-dir{font-size:14px;color:var(--muted)}
.result-panel{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1rem 1.25rem}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.result-row:last-child{border-bottom:none}
.rlabel{color:var(--muted)}
.rval{font-family:'Space Mono',monospace;color:var(--text)}
.score-display{text-align:center;padding:.75rem 0 .25rem}
.score-num{font-size:54px;font-weight:800;font-family:'Space Mono',monospace;line-height:1}
.score-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.score-emoji{font-size:26px;margin-top:6px}
.btn-row{width:100%;display:flex;gap:10px}
.btn{flex:1;padding:1rem;border-radius:14px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;transition:transform .1s,opacity .1s;letter-spacing:.02em}
.btn:active{transform:scale(.97);opacity:.85}
.btn-main{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;flex:2}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.notice{width:100%;background:rgba(255,190,11,.1);border:1px solid rgba(255,190,11,.25);border-radius:12px;padding:.75rem 1rem;font-size:12px;color:var(--warn);line-height:1.6}
</style>
</head>
<body>
<div class="stars"></div>
<div class="app">

  <div class="header">
    <div class="logo">Kompass<span>jakt</span></div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">v8</div>
  </div>

  <div class="location-bar">
    <div class="loc-dot searching" id="locDot"></div>
    <div class="loc-text" id="locText">Henter posisjon…</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statR">0</div><div class="stat-lbl">Runder</div></div>
    <div class="stat"><div class="stat-num" id="statA">—</div><div class="stat-lbl">Snitt</div></div>
    <div class="stat"><div class="stat-num" id="statB">—</div><div class="stat-lbl">Beste</div></div>
  </div>

  <!-- IDLE -->
  <div class="idle-screen" id="idleScreen">
    <div class="idle-icon">🧭</div>
    <div class="idle-title">Kompassjakt</div>
    <div class="idle-desc">En tilfeldig hovedstad vises. Snu deg mot den og lås inn retningen.</div>
  </div>

  <!-- GAME -->
  <div id="gameScreen" style="display:none;width:100%;flex-direction:column;align-items:center;gap:.9rem">
    <div class="capital-card">
      <div class="phase-pill" id="phasePill">Sikt inn</div>
      <div class="capital-name" id="capitalName">—</div>
      <div class="capital-country" id="capitalCountry">—</div>
      <div class="capital-dist" id="capitalDist"></div>
    </div>

    <div class="compass-section">
      <!--
        SVG kompass 260x260, senter (130,130).

        NØKKELREGEL:
        - En SVG-gruppe med rotate(A, cx, cy) roterer ALLE punkter i gruppen
          rundt sentrum (cx,cy) med A grader MEDURS.
        - En pil som peker MOT TOPPEN av SVG-en (nord) ved rotate(0)
          vil peke mot 90° (øst) ved rotate(90), 180° (sør) ved rotate(180), osv.

        RØDNÅL (compassNeedle):
          - Nåla er tegnet med rød spiss opp (mot y=20 = nord)
          - Vi vil at rød spiss ALLTID skal peke mot nord på skjermen
          - Når telefonen peker mot øst, heading=90°
          - Vi roterer nåla med -90° → den peker tilbake mot nord ✓
          - Formel: rotate(-heading, 130, 130)

        GRØNN PIL (targetNeedle, vises kun etter lås):
          - Pil tegnet med grønn spiss opp (mot y=20 = nord) ved rotate(0)
          - Vi vil at grønn spiss skal peke mot correctBearing° fra nord
          - Formel: rotate(correctBearing, 130, 130)
          - Eksempel: correctBearing=231 → pil peker mot SV ✓

        De to er UAVHENGIGE SVG-grupper med identisk geometri men ulik rotasjon.
        Ingen av dem påvirker hverandre.

        VIKTIG: setHeading() oppdaterer KUN compassNeedle.
        targetNeedle settes EN gang i lockHeading() og røres ALDRI igjen.
      -->
      <svg id="compassSvg" width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">

        <!-- Bakgrunn -->
        <circle cx="130" cy="130" r="128" fill="#111827" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

        <!-- Gradtikker (faste, roterer ikke) -->
        <g id="ticks">
          <!-- Hvert 10° -->
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(10  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(20  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(30  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(40  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(50  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(60  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(70  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(80  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2" transform="rotate(90  130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(100 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(110 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(120 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(130 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(140 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(150 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(160 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(170 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2" transform="rotate(180 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(190 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(200 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(210 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(220 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(230 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(240 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(250 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(260 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2" transform="rotate(270 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(280 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(290 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(300 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(310 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(320 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(330 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(340 130 130)"/>
          <line x1="130" y1="6"  x2="130" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(350 130 130)"/>
          <!-- Nord tick (stor, rød) -->
          <line x1="130" y1="4"  x2="130" y2="26" stroke="#ff4d6d" stroke-width="3"/>
        </g>

        <!-- Kardinalpunkter (faste) -->
        <text x="130" y="40" text-anchor="middle" font-family="Space Mono" font-size="15" font-weight="700" fill="#ff4d6d">N</text>
        <text x="130" y="224" text-anchor="middle" font-family="Space Mono" font-size="13" fill="#6b7a99">S</text>
        <text x="222" y="135" text-anchor="middle" font-family="Space Mono" font-size="13" fill="#6b7a99">Ø</text>
        <text x="38"  y="135" text-anchor="middle" font-family="Space Mono" font-size="13" fill="#6b7a99">V</text>

        <!--
          KOMPASSNÅL (rød) — oppdateres kontinuerlig av setHeading()
          Rød spiss: fra senter (130,130) mot topp (130,22) — peker nord ved rotate(0)
          Grå hale: fra senter mot bunn (130,200)
          rotate(-heading, 130, 130) → spiss peker alltid nord på skjermen
        -->
        <g id="compassNeedle" transform="rotate(0,130,130)">
          <!-- Rød nord-spiss -->
          <polygon points="130,22  122,130  138,130" fill="#ff4d6d"/>
          <!-- Grå sør-hale -->
          <polygon points="130,200 122,130  138,130" fill="#6b7a99" opacity="0.7"/>
        </g>

        <!-- Sentrum -->
        <circle cx="130" cy="130" r="11" fill="#1a2235" stroke="#00e5b4" stroke-width="2.5"/>
        <circle cx="130" cy="130" r="4"  fill="#00e5b4"/>

        <!--
          GRØNN PIL (riktig retning) — vises KUN etter lås, settes EN gang
          Spiss: fra senter (130,130) mot topp (130,22) — peker nord ved rotate(0)
          rotate(correctBearing, 130, 130) → spiss peker mot correctBearing° fra nord
          ALDRI rørt av setHeading() — fullstendig uavhengig av compassNeedle
        -->
        <g id="targetNeedle" transform="rotate(0,130,130)" display="none">
          <line x1="130" y1="130" x2="130" y2="28" stroke="#00e5b4" stroke-width="3.5" stroke-linecap="round"/>
          <polygon points="130,18  121,38  139,38" fill="#00e5b4"/>
        </g>

      </svg>

      <div class="heading-row">
        <div class="heading-val" id="headingVal">—°</div>
        <div class="heading-dir" id="headingDir">—</div>
      </div>
    </div>
  </div>

  <!-- RESULTAT -->
  <div id="resultPanel" class="result-panel" style="display:none">
    <div class="score-display">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-sub">Nøyaktighet</div>
      <div class="score-emoji" id="scoreEmoji">—</div>
    </div>
    <div class="result-row"><span class="rlabel">Riktig retning</span><span class="rval" id="resCorrect">—</span></div>
    <div class="result-row"><span class="rlabel">Din retning</span><span class="rval" id="resYours">—</span></div>
    <div class="result-row"><span class="rlabel">Avvik</span><span class="rval" id="resDiff">—</span></div>
    <div class="result-row"><span class="rlabel">Fra posisjon</span><span class="rval" id="resFromPos">—</span></div>
  </div>

  <div class="notice" id="notice" style="display:none"></div>

  <div class="btn-row">
    <button class="btn btn-main" id="mainBtn" onclick="onMainBtn()" disabled>Henter posisjon…</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let phase = 'idle';       // 'idle' | 'aiming' | 'result'
let currentCapital = null;
let liveHeading = 0;      // kontinuerlig oppdatert av sensor
let lockedHeading = null; // satt én gang i lockHeading(), aldri endret
let compassStarted = false;
let gotAbsolute = false;
let lastIdx = -1;
let rounds = 0, scores = [];
let userLat = null, userLon = null, userPlace = null;

// ════════════════════════════════════════════════════════
//  SVG-elementer
// ════════════════════════════════════════════════════════
const compassNeedle = document.getElementById('compassNeedle');
const targetNeedle  = document.getElementById('targetNeedle');

// ════════════════════════════════════════════════════════
//  KAPITALER
// ════════════════════════════════════════════════════════
const CAPITALS = [

  {n:"Buenos Aires",c:"Argentina",lat:-34.6,lon:-58.38},{n:"Nairobi",c:"Kenya",lat:-1.29,lon:36.82},
  {n:"Seoul",c:"Sør-Korea",lat:37.57,lon:126.98},{n:"Bangkok",c:"Thailand",lat:13.75,lon:100.52},
  {n:"Jakarta",c:"Indonesia",lat:-6.21,lon:106.85},{n:"Mexico City",c:"Mexico",lat:19.43,lon:-99.13},
  {n:"Ankara",c:"Tyrkia",lat:39.93,lon:32.86},{n:"Teheran",c:"Iran",lat:35.69,lon:51.39},
  {n:"Riyadh",c:"Saudi-Arabia",lat:24.69,lon:46.72},{n:"Addis Abeba",c:"Etiopia",lat:9.03,lon:38.74},
  {n:"Havana",c:"Cuba",lat:23.14,lon:-82.36},{n:"Lima",c:"Peru",lat:-12.04,lon:-77.03},
  {n:"Warszawa",c:"Polen",lat:52.23,lon:21.01},{n:"Stockholm",c:"Sverige",lat:59.33,lon:18.07},
  {n:"Helsinki",c:"Finland",lat:60.17,lon:24.94},{n:"Praha",c:"Tsjekkia",lat:50.08,lon:14.44},
  {n:"Wien",c:"Østerrike",lat:48.21,lon:16.37},{n:"Amsterdam",c:"Nederland",lat:52.37,lon:4.9},
  {n:"Lisboa",c:"Portugal",lat:38.72,lon:-9.14},{n:"Athen",c:"Hellas",lat:37.98,lon:23.73},
  {n:"Budapest",c:"Ungarn",lat:47.5,lon:19.04},{n:"Kyiv",c:"Ukraina",lat:50.45,lon:30.52},
  {n:"Reykjavik",c:"Island",lat:64.14,lon:-21.94},{n:"Kabul",c:"Afghanistan",lat:34.53,lon:69.17},
  {n:"Islamabad",c:"Pakistan",lat:33.72,lon:73.04},{n:"Dhaka",c:"Bangladesh",lat:23.81,lon:90.41},

// ════════════════════════════════════════════════════════
//  MATEMATIKK
// ════════════════════════════════════════════════════════
function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}

// Bearing fra (fromLat,fromLon) til (toLat,toLon)
// Returnerer 0–360°, 0=nord, 90=øst, 180=sør, 270=vest
function bearingBetween(fromLat,fromLon,toLat,toLon){
  const la1=toRad(fromLat),la2=toRad(toLat),dL=toRad(toLon-fromLon);
  const y=Math.sin(dL)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dL);
  return(toDeg(Math.atan2(y,x))+360)%360;
}

function distKm(la1,lo1,la2,lo2){
  const R=6371,dLat=toRad(la2-la1),dLon=toRad(lo2-lo1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function angleDiff(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d}
function scoreFromDiff(d){return Math.max(0,Math.round(100*(1-d/180)))}

function dirLabel(deg){
  const d=['N','NNØ','NØ','ØNØ','Ø','ØSØ','SØ','SSØ','S','SSV','SV','VSV','V','VNV','NV','NNV'];
  return d[Math.round(deg/22.5)%16];
}
function scoreColor(s){return s>=90?'#00e5b4':s>=70?'#9fdd5b':s>=50?'#ffbe0b':'#ff4d6d'}
function scoreEmoji(s){return s>=95?'🎯':s>=80?'🌟':s>=60?'👍':s>=40?'😅':'🙈'}

// ════════════════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════════════════
function startGPS(){
  if(!navigator.geolocation){setLocErr('GPS ikke støttet');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    document.getElementById('locDot').className='loc-dot ok';
    document.getElementById('locText').innerHTML=
      `📍 ${userLat.toFixed(3)}°, ${userLon.toFixed(3)}° — identifiserer…`;
    enableBtn();
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLon}&format=json&zoom=10`)
      .then(r=>r.json()).then(d=>{
        const a=d.address||{};
        userPlace=a.city||a.town||a.village||a.county||a.country||null;
        document.getElementById('locText').innerHTML=
          `📍 <strong>${userPlace||'Ukjent'}</strong> (${userLat.toFixed(3)}°, ${userLon.toFixed(3)}°)`;
      }).catch(()=>{userPlace=null});
  },()=>{
    userLat=60.39;userLon=5.32;userPlace='Bergen (standard)';
    setLocErr('GPS feilet — bruker Bergen som standard');
    enableBtn();
  },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}

function setLocErr(m){
  document.getElementById('locDot').className='loc-dot err';
  document.getElementById('locText').textContent=m;
}
function enableBtn(){
  const b=document.getElementById('mainBtn');
  b.disabled=false;b.textContent='Start spill';
}

// ════════════════════════════════════════════════════════
//  KOMPASS
// ════════════════════════════════════════════════════════
/*
  heading = grader MED KLOKKA fra NORD som TOPPEN AV TELEFONEN peker.
  0° = nord, 90° = øst, 180° = sør, 270° = vest.

  Android deviceorientationabsolute:
    e.alpha = grader enheten har rotert MOT KLOKKA rundt vertikal akse.
    Topp peker nord → alpha=0  → heading = (360-0)%360 = 0 ✓
    Topp peker øst  → alpha=270→ heading = (360-270) = 90 ✓
    Topp peker vest → alpha=90 → heading = (360-90) = 270 ✓
    Formel: heading = (360 - alpha) % 360

  iOS webkitCompassHeading:
    Allerede = heading direkte (0=nord, CW). Ingen konvertering.

  setHeading() gjør KUN:
    1. Oppdaterer liveHeading
    2. Roterer compassNeedle: rotate(-heading, 130, 130)
    3. Oppdaterer grader-tekst
    4. Rører ALDRI targetNeedle
*/
function setHeading(h){
  liveHeading = (h+360)%360;

  // Oppdater nål BARE under sikting, ikke etter lås
  if(phase==='aiming'){
    compassNeedle.setAttribute('transform',`rotate(${-liveHeading},130,130)`);
    document.getElementById('headingVal').textContent=Math.round(liveHeading)+'°';
    document.getElementById('headingDir').textContent=dirLabel(liveHeading);
  }
  // I result-fasen: ingenting — nål og pil er frosset
}

function onAbsolute(e){
  if(e.alpha===null)return;
  gotAbsolute=true;
  setHeading((360-e.alpha)%360);
}

function onOrientation(e){
  if(gotAbsolute)return;
  if(e.alpha===null)return;
  if(typeof e.webkitCompassHeading==='number'&&e.webkitCompassHeading>=0){
    setHeading(e.webkitCompassHeading);
  } else {
    setHeading((360-e.alpha)%360);
  }
}

async function startCompass(){
  if(compassStarted)return;
  compassStarted=true;
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const r=await DeviceOrientationEvent.requestPermission();
      if(r!=='granted'){showNotice('⚠️ Kompasstillatelse avslått.');return}
    }catch(e){showNotice('⚠️ Kompassfeil: '+e.message);return}
  }
  window.addEventListener('deviceorientationabsolute',onAbsolute,true);
  window.addEventListener('deviceorientation',onOrientation,true);
  setTimeout(()=>{
    if(!gotAbsolute&&liveHeading===0)
      showNotice('⚠️ Kompasset svarer ikke. Åpne i Chrome og gi tilgang til sensorer.');
  },2500);
}

// ════════════════════════════════════════════════════════
//  UI HJELPERE
// ════════════════════════════════════════════════════════
function showNotice(m){const el=document.getElementById('notice');el.textContent=m;el.style.display='block'}
function hideNotice(){document.getElementById('notice').style.display='none'}
function updateStats(){
  document.getElementById('statR').textContent=rounds;
  if(!scores.length){
    document.getElementById('statA').textContent='—';
    document.getElementById('statB').textContent='—';
  }else{
    document.getElementById('statA').textContent=Math.round(scores.reduce((a,b)=>a+b)/scores.length)+'%';
    document.getElementById('statB').textContent=Math.max(...scores)+'%';
  }
}

// ════════════════════════════════════════════════════════
//  SPILLFLYT
// ════════════════════════════════════════════════════════
async function startGame(){
  await startCompass();
  nextCity();
}

function nextCity(){
  let idx;
  do{idx=Math.floor(Math.random()*CAPITALS.length)}while(idx===lastIdx&&CAPITALS.length>1);
  lastIdx=idx;
  currentCapital=CAPITALS[idx];
  lockedHeading=null;
  phase='aiming';

  // Gjemmer resultater, viser spill
  document.getElementById('idleScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  document.getElementById('resultPanel').style.display='none';
  hideNotice();

  // Gjemmer grønn pil
  targetNeedle.setAttribute('display','none');

  // Setter kompassnål til live heading (snapser, ingen animasjon)
  compassNeedle.setAttribute('transform',`rotate(${-liveHeading},130,130)`);

  // Oppdaterer UI
  document.getElementById('headingVal').textContent=Math.round(liveHeading)+'°';
  document.getElementById('headingDir').textContent=dirLabel(liveHeading);
  document.getElementById('phasePill').textContent='Sikt inn';
  document.getElementById('phasePill').className='phase-pill';
  document.getElementById('capitalName').textContent=currentCapital.n;
  document.getElementById('capitalCountry').textContent=currentCapital.c;
  const dist=distKm(userLat,userLon,currentCapital.lat,currentCapital.lon);
  document.getElementById('capitalDist').textContent=Math.round(dist).toLocaleString('no')+' km unna';
  document.getElementById('mainBtn').textContent='📍 Lås inn retning';
  document.getElementById('mainBtn').disabled=false;
}

function lockHeading(){
  if(phase!=='aiming')return;

  // ── LÅS ──────────────────────────────────────────────
  // 1. Fryser liveHeading som lockedHeading
  lockedHeading = Math.round(liveHeading);

  // 2. Setter phase til result FØR noe annet — setHeading() gjør ingenting lenger
  phase='result';

  // 3. Beregner riktig retning fra GPS
  const correct = Math.round(bearingBetween(userLat,userLon,currentCapital.lat,currentCapital.lon));

  // 4. Fryser kompassnåla ved lockedHeading (den er allerede der, men setter eksplisitt)
  compassNeedle.setAttribute('transform',`rotate(${-lockedHeading},130,130)`);

  // 5. Viser grønn pil ved correct bearing — UAVHENGIG av nåla
  //    rotate(correct, 130, 130): spiss peker mot toppen (nord) ved 0°,
  //    og roterer correct° med klokka → peker mot correct° fra nord ✓
  targetNeedle.setAttribute('transform',`rotate(${correct},130,130)`);
  targetNeedle.setAttribute('display','block');

  // 6. Oppdaterer visning til lockedHeading (ikke live!)
  document.getElementById('headingVal').textContent=lockedHeading+'°';
  document.getElementById('headingDir').textContent=dirLabel(lockedHeading);

  // ── SCORE ─────────────────────────────────────────────
  const diff=Math.round(angleDiff(lockedHeading,correct));
  const score=scoreFromDiff(diff);
  rounds++;scores.push(score);updateStats();

  // ── RESULTATPANEL ─────────────────────────────────────
  document.getElementById('phasePill').textContent='Resultat';
  document.getElementById('phasePill').className='phase-pill result';
  document.getElementById('resCorrect').textContent=correct+'° ('+dirLabel(correct)+')';
  document.getElementById('resYours').textContent=lockedHeading+'° ('+dirLabel(lockedHeading)+')';
  document.getElementById('resDiff').textContent=diff+'° avvik';
  document.getElementById('resFromPos').textContent=userPlace||(userLat.toFixed(2)+'°, '+userLon.toFixed(2)+'°');

  const sn=document.getElementById('scoreNum');
  sn.textContent=score+'%';
  sn.style.color=scoreColor(score);
  document.getElementById('scoreEmoji').textContent=scoreEmoji(score);
  document.getElementById('resultPanel').style.display='block';
  document.getElementById('mainBtn').textContent='➡ Neste by';
}

function onMainBtn(){
  if(phase==='idle')       startGame();
  else if(phase==='aiming') lockHeading();
  else if(phase==='result') nextCity();
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
updateStats();
startGPS();
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
